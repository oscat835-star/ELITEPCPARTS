AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ELITEPCPARTS static site hosting: CloudFront (with OAC + security headers) in front
  of a private S3 bucket. The bucket itself is NOT created here — the deploy workflow
  ensures it exists (create-if-missing) so re-runs never fail on an existing bucket.
  This stack manages CloudFront, the OAC, the response-headers policy, and the bucket
  policy that lets CloudFront read the (external) bucket.

Parameters:
  SiteBucketName:
    Type: String
    Default: elite-pc-parts-461839758888-us-east-2-an
    Description: Name of the S3 bucket that holds the site (ensured by the deploy workflow).
  SiteBucketRegion:
    Type: String
    Default: us-east-2
    Description: Region of SiteBucketName — used to build the CloudFront origin domain.

Resources:
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Security response headers. The Content-Security-Policy is what makes the
  # browser allow the Firebase SDK's direct calls (Firestore/Auth) and the
  # product images served from the S3 image bucket. Without a CSP the browser
  # already permits these; this policy hardens the site while keeping Firebase
  # working by explicitly whitelisting the Google/Firebase endpoints.
  ResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${AWS::StackName}-security-headers"
        Comment: CSP allowing Firebase (Firestore/Auth) + the product-images S3 bucket
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: SAMEORIGIN
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Preload: true
            Override: true
          ContentSecurityPolicy:
            Override: true
            ContentSecurityPolicy: >-
              default-src 'self';
              script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com;
              style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;
              font-src 'self' data: https://cdnjs.cloudflare.com;
              img-src 'self' data: https://product-images-461839758888-us-east-2-an.s3.us-east-2.amazonaws.com https://*.googleapis.com https://*.gstatic.com https://lh3.googleusercontent.com;
              connect-src 'self' https://*.googleapis.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com;
              frame-src https://elitepcparts-5d89d.firebaseapp.com https://apis.google.com https://accounts.google.com;
              base-uri 'self';
              object-src 'none'

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        HttpVersion: http2and3
        Origins:
          - Id: s3-origin
            DomainName: !Sub "${SiteBucketName}.s3.${SiteBucketRegion}.amazonaws.com"
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: s3-origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          # AWS managed "CachingOptimized" policy.
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref ResponseHeadersPolicy
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /src/pages/404.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /src/pages/404.html
            ErrorCachingMinTTL: 10

  # Applies the CloudFront-read policy to the (externally-ensured) bucket. Works
  # whether the bucket was just created or already existed.
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucketName
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${SiteBucketName}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution.Id}"

Outputs:
  BucketName:
    Description: S3 bucket the site is synced to
    Value: !Ref SiteBucketName
  DistributionId:
    Description: CloudFront distribution ID (for cache invalidation)
    Value: !Ref Distribution
  DistributionDomainName:
    Description: Public HTTPS URL of the site
    Value: !GetAtt Distribution.DomainName