<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Elite PC Parts</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <header class="header">
    <div class="header__inner container">
      <a href="../../index.html" class="header__logo">
        <span class="logo-elite">ELITE</span><span class="logo-pc"> PC PARTS</span>
      </a>
      <nav class="header__nav">
        <a href="../../index.html">Inicio</a>
        <a href="catalogo.html">Productos</a>
        <a href="servicios.html">Servicios</a>
        <a href="pcbuilder.html">PC Builder</a>
        <a href="contacto.html">Contacto</a>
      </nav>
      <div class="header__actions">
        <div class="search-bar">
          <input type="text" placeholder="Buscar productos..." />
          <button><i class="fa fa-search"></i></button>
        </div>
        <a href="carrito.html" class="icon-btn cart-btn">
          <i class="fa fa-shopping-cart"></i>
          <span class="cart-badge">0</span>
        </a>
      </div>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
    <nav class="mobile-nav" id="mobileNav">
      <a href="../../index.html">Inicio</a>
      <a href="catalogo.html">Productos</a>
      <a href="servicios.html">Servicios</a>
      <a href="pcbuilder.html">PC Builder</a>
      <a href="contacto.html">Contacto</a>
    </nav>
  </header>

  <main class="auth-main">
    <div class="auth-card">

      <div class="auth-logo">
        <span class="logo-elite">ELITE</span><span class="logo-pc"> PC PARTS</span>
      </div>

      <h1 class="auth-title">Iniciar sesión</h1>
      <p class="auth-sub">¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a></p>

      <div class="auth-alert" id="authAlert" style="display:none"></div>

      <form class="auth-form" id="loginForm" novalidate>

        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-icon">
            <i class="fa fa-envelope"></i>
            <input type="email" id="email" placeholder="tu@email.com" autocomplete="email" />
          </div>
          <span class="field-error" id="err-email"></span>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-icon">
            <i class="fa fa-lock"></i>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="toggle-pwd" id="togglePwd" tabindex="-1">
              <i class="fa fa-eye"></i>
            </button>
          </div>
          <span class="field-error" id="err-password"></span>
        </div>

        <div class="auth-row">
          <label class="checkbox-label">
            <input type="checkbox" id="remember" />
            <span>Recordarme</span>
          </label>
          <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn btn--primary auth-btn" id="loginBtn">
          Iniciar sesión
        </button>

      </form>

      <div class="auth-divider"><span>o continúa con</span></div>

      <div class="social-btns">
        <button class="social-btn" onclick="socialLogin('Google')">
          <i class="fab fa-google"></i> Google
        </button>
        <button class="social-btn" onclick="socialLogin('Facebook')">
          <i class="fab fa-facebook-f"></i> Facebook
        </button>
      </div>

    </div>
  </main>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      clearErrors();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      let valid = true;

      if (!email) { setError('email', 'Ingresa tu email'); valid = false; }
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError('email', 'Email inválido'); valid = false; }
      if (!password) { setError('password', 'Ingresa tu contraseña'); valid = false; }

      if (!valid) return;

      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Ingresando...';

      // "Recordarme": LOCAL persists across browser restarts, SESSION clears on close.
      const persistence = remember
        ? firebase.auth.Auth.Persistence.LOCAL
        : firebase.auth.Auth.Persistence.SESSION;

      auth.setPersistence(persistence)
        .then(() => auth.signInWithEmailAndPassword(email, password))
        .then((cred) => {
          const user = cred.user;
          loginSuccess({
            id: user.uid,
            firstName: user.displayName?.split(' ')[0] || '',
            lastName:  user.displayName?.split(' ').slice(1).join(' ') || '',
            email:     user.email,
          });
        })
        .catch(() => {
          btn.disabled = false;
          btn.innerHTML = 'Iniciar sesión';
          showAlert('Email o contraseña incorrectos.', 'error');
        });
    });

    // Restablecer contraseña
    document.querySelector('.forgot-link')?.addEventListener('click', function(e) {
      e.preventDefault();
      clearErrors();
      const email = document.getElementById('email').value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setError('email', 'Ingresa tu email para enviarte el enlace de restablecimiento');
        return;
      }
      auth.sendPasswordResetEmail(email)
        .then(() => showAlert('Te enviamos un email para restablecer tu contraseña. Revisá tu bandeja.', 'success'))
        .catch(() => showAlert('No se pudo enviar el email de restablecimiento.', 'error'));
    });

    document.getElementById('togglePwd').addEventListener('click', function() {
      const input = document.getElementById('password');
      const icon  = this.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fa fa-eye';
      }
    });

    function socialLogin(provider) {
      if (provider !== 'Google') {
        showAlert(`Login con ${provider} no está configurado.`, 'info');
        return;
      }
      const gp = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(gp)
        .then((cred) => {
          const u = cred.user;
          const firstName = u.displayName?.split(' ')[0] || '';
          const lastName  = u.displayName?.split(' ').slice(1).join(' ') || '';
          return db.collection('usuarios').doc(u.uid)
            .set({ firstName, lastName, email: u.email, phone: u.phoneNumber || '' }, { merge: true })
            .then(() => loginSuccess({ id: u.uid, firstName, lastName, email: u.email }));
        })
        .catch((err) => {
          if (err.code === 'auth/popup-closed-by-user') return;
          if (err.code === 'auth/unauthorized-domain') {
            showAlert('Este dominio aún no está autorizado para Google. Iniciá sesión con email y contraseña (funciona en cualquier despliegue), o pedí al administrador que agregue este dominio en Firebase → Authentication → Authorized domains.', 'info');
          } else if (err.code === 'auth/operation-not-allowed') {
            showAlert('El inicio con Google no está habilitado en este proyecto. Usá email y contraseña.', 'info');
          } else {
            showAlert('No se pudo iniciar sesión con Google.', 'error');
          }
        });
    }
  </script>
</body>
</html>
