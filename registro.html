<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — Elite PC Parts</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <header class="header">
    <div class="header__inner container">
      <a href="index.html" class="header__logo">
        <span class="logo-elite">ELITE</span><span class="logo-pc"> PC PARTS</span>
      </a>
      <nav class="header__nav">
        <a href="index.html">Inicio</a>
        <a href="catalogo.html">Productos</a>
        <a href="servicios.html">Servicios</a>
        <a href="pcbuilder.html">PC Builder</a>
        <a href="contacto.html">Contacto</a>
      </nav>
      <div class="header__actions">
        <div class="search-bar">
          <input type="text" placeholder="Buscar productos..." />
          <button><i class="fa fa-search"></i></button>
        </div>
        <a href="carrito.html" class="icon-btn cart-btn">
          <i class="fa fa-shopping-cart"></i>
          <span class="cart-badge">0</span>
        </a>
      </div>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
    <nav class="mobile-nav" id="mobileNav">
      <a href="index.html">Inicio</a>
      <a href="catalogo.html">Productos</a>
      <a href="servicios.html">Servicios</a>
      <a href="pcbuilder.html">PC Builder</a>
      <a href="contacto.html">Contacto</a>
    </nav>
  </header>

  <main class="auth-main">
    <div class="auth-card">

      <div class="auth-logo">
        <span class="logo-elite">ELITE</span><span class="logo-pc"> PC PARTS</span>
      </div>

      <h1 class="auth-title">Crear cuenta</h1>
      <p class="auth-sub">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>

      <div class="auth-alert" id="authAlert" style="display:none"></div>

      <form class="auth-form" id="registerForm" novalidate>

        <div class="form-row">
          <div class="form-group">
            <label for="firstName">Nombre <span class="req">*</span></label>
            <div class="input-icon">
              <i class="fa fa-user"></i>
              <input type="text" id="firstName" placeholder="Juan" autocomplete="given-name" />
            </div>
            <span class="field-error" id="err-firstName"></span>
          </div>
          <div class="form-group">
            <label for="lastName">Apellido <span class="req">*</span></label>
            <div class="input-icon">
              <i class="fa fa-user"></i>
              <input type="text" id="lastName" placeholder="Pérez" autocomplete="family-name" />
            </div>
            <span class="field-error" id="err-lastName"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email <span class="req">*</span></label>
          <div class="input-icon">
            <i class="fa fa-envelope"></i>
            <input type="email" id="email" placeholder="tu@email.com" autocomplete="email" />
          </div>
          <span class="field-error" id="err-email"></span>
        </div>

        <div class="form-group">
          <label for="phone">Teléfono</label>
          <div class="input-icon">
            <i class="fa fa-phone"></i>
            <input type="tel" id="phone" placeholder="+51 999 999 999" autocomplete="tel" />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña <span class="req">*</span></label>
          <div class="input-icon">
            <i class="fa fa-lock"></i>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
            <button type="button" class="toggle-pwd" id="togglePwd" tabindex="-1">
              <i class="fa fa-eye"></i>
            </button>
          </div>
          <div class="pwd-strength" id="pwdStrength">
            <div class="pwd-bar"><div id="pwdBar"></div></div>
            <span id="pwdLabel"></span>
          </div>
          <span class="field-error" id="err-password"></span>
        </div>

        <div class="form-group">
          <label for="confirm">Confirmar contraseña <span class="req">*</span></label>
          <div class="input-icon">
            <i class="fa fa-lock"></i>
            <input type="password" id="confirm" placeholder="Repite tu contraseña" autocomplete="new-password" />
          </div>
          <span class="field-error" id="err-confirm"></span>
        </div>

        <label class="checkbox-label terms">
          <input type="checkbox" id="terms" />
          <span>Acepto los <a href="#">términos y condiciones</a> y la <a href="#">política de privacidad</a></span>
        </label>
        <span class="field-error" id="err-terms"></span>

        <button type="submit" class="btn btn--primary auth-btn" id="registerBtn">
          Crear cuenta
        </button>

      </form>

      <div class="auth-divider"><span>o regístrate con</span></div>

      <div class="social-btns">
        <button class="social-btn" onclick="socialLogin('Google')">
          <i class="fab fa-google"></i> Google
        </button>
        <button class="social-btn" onclick="socialLogin('Facebook')">
          <i class="fab fa-facebook-f"></i> Facebook
        </button>
      </div>

    </div>
  </main>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Password strength
    document.getElementById('password').addEventListener('input', function() {
      const val = this.value;
      const bar  = document.getElementById('pwdBar');
      const label = document.getElementById('pwdLabel');
      let strength = 0;
      if (val.length >= 6)  strength++;
      if (val.length >= 10) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const levels = ['', 'Muy débil', 'Débil', 'Regular', 'Buena', 'Fuerte'];
      const colors = ['', '#ef4444', '#f97316', '#f59e0b', '#22c55e', '#6366f1'];
      bar.style.width   = (strength * 20) + '%';
      bar.style.background = colors[strength] || 'transparent';
      label.textContent = val ? levels[strength] || '' : '';
      label.style.color = colors[strength];
    });

    document.getElementById('togglePwd').addEventListener('click', function() {
      const input = document.getElementById('password');
      const icon  = this.querySelector('i');
      if (input.type === 'password') { input.type = 'text'; icon.className = 'fa fa-eye-slash'; }
      else { input.type = 'password'; icon.className = 'fa fa-eye'; }
    });

    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      clearErrors();

      const firstName = document.getElementById('firstName').value.trim();
      const lastName  = document.getElementById('lastName').value.trim();
      const email     = document.getElementById('email').value.trim();
      const phone     = document.getElementById('phone').value.trim();
      const password  = document.getElementById('password').value;
      const confirm   = document.getElementById('confirm').value;
      const terms     = document.getElementById('terms').checked;
      let valid = true;

      if (!firstName) { setError('firstName', 'Ingresa tu nombre'); valid = false; }
      if (!lastName)  { setError('lastName',  'Ingresa tu apellido'); valid = false; }
      if (!email) { setError('email', 'Ingresa tu email'); valid = false; }
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError('email', 'Email inválido'); valid = false; }
      if (!password || password.length < 6) { setError('password', 'Mínimo 6 caracteres'); valid = false; }
      if (password !== confirm) { setError('confirm', 'Las contraseñas no coinciden'); valid = false; }
      if (!terms) { setError('terms', 'Debes aceptar los términos'); valid = false; }

      if (!valid) return;

      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Creando cuenta...';

      auth.createUserWithEmailAndPassword(email, password)
        .then((cred) => {
          const user = cred.user;
          return user.updateProfile({ displayName: `${firstName} ${lastName}` })
            .then(() => db.collection('usuarios').doc(user.uid).set({
              firstName,
              lastName,
              email,
              phone,
              createdAt: new Date().toLocaleDateString('es-PE'),
            }))
            .then(() => {
              loginSuccess({ id: user.uid, firstName, lastName, email, phone }, false);
            });
        })
        .catch((err) => {
          btn.disabled = false;
          btn.innerHTML = 'Crear cuenta';
          if (err.code === 'auth/email-already-in-use') {
            setError('email', 'Ya existe una cuenta con ese email');
          } else {
            showAlert(err.message, 'error');
          }
        });
    });

    function socialLogin(provider) {
      showAlert(`Login con ${provider} no disponible en la demo.`, 'info');
    }
  </script>
</body>
</html>
